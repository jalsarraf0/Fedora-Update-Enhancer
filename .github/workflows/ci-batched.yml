name: Regression CI (Batched)

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: fedora-regression-batched-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  regression:
    name: Regression (${{ matrix.batch }})
    runs-on: [self-hosted, gentoo]
    strategy:
      fail-fast: false
      max-parallel: 2
        batch: ["syntax", "mock-upgrade"]
    env:
      DOCKER_RUNNER_CACHE: /tmp/docker-runner
      DOCKER_RUNNER_PRUNE: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize Docker runner cache
        run: mkdir -p /tmp/docker-runner/{images,cache,artifacts}

      - name: Syntax checks
        if: matrix.batch == 'syntax'
        run: bash .github/scripts/docker-runner.sh debian:bookworm-slim "bash -n elegant-updater.sh"

      - name: shfmt format validation (advisory)
        if: matrix.batch == 'syntax'
        continue-on-error: true
        run: |
          set -euo pipefail
          if command -v shfmt >/dev/null 2>&1; then
            echo "::notice::Running shfmt format check (non-blocking)"
            shfmt -d -i 2 -ci -bn elegant-updater.sh
          else
            echo "::warning::shfmt not found on runner — skipping format check"
          fi

      - name: Full updater regression with mocked dnf5
        if: matrix.batch == 'mock-upgrade'
        run: |
          set -Eeuo pipefail

          TMP="$(mktemp -d)"
          FAKE_DNF="${TMP}/dnf5"
          FAKE_CONF="${TMP}/dnf.conf"
          REPO_DIR="${TMP}/repos"

          cat > "${FAKE_DNF}" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          cmd="${1:-}"
          shift || true

          case "${cmd}" in
            makecache)
              if [[ "${1:-}" == "--help" ]]; then
                echo "usage: dnf5 makecache [--timer]"
              fi
              exit 0
              ;;
            clean|upgrade|update|autoremove|remove)
              exit 0
              ;;
            repoquery)
              if [[ "${1:-}" == "--help" ]]; then
                echo "--installonly"
              fi
              exit 0
              ;;
            *)
              exit 0
              ;;
          esac
          EOF
          chmod +x "${FAKE_DNF}"

          mkdir -p "${REPO_DIR}"
          cat > "${REPO_DIR}/test.repo" <<'EOF'
          [test]
          name=Test Repo
          baseurl=https://example.invalid/repo
          enabled=1
          gpgcheck=0
          EOF
          touch "${FAKE_CONF}"

          sudo -E DNF="${FAKE_DNF}" \
            DNF_CONF="${FAKE_CONF}" \
            REPO_DIR="${REPO_DIR}" \
            SHOW_REPO_LIST=0 \
            RUN_UPDATE_SWEEP=1 \
            bash ./elegant-updater.sh
