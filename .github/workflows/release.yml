name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish release bundle
    runs-on: [self-hosted, linux, x64, docker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release artifacts
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="Fedora-Update-Enhancer-${VERSION}.tar.gz"
          tar -czf "${ARCHIVE}" elegant-updater.sh README.md LICENSE
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Fedora-Update-Enhancer-*.tar.gz
            Fedora-Update-Enhancer-*.tar.gz.sha256
