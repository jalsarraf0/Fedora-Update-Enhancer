name: SBOM Generation

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1"   # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CycloneDX SBOM
        run: |
          set -euo pipefail

          VERSION="${GITHUB_SHA:0:10}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          SCRIPT="elegant-updater.sh"
          SCRIPT_SHA256="$(sha256sum "${SCRIPT}" | awk '{print $1}')"

          cat > sbom.cdx.json <<EOF
          {
            "bomFormat": "CycloneDX",
            "specVersion": "1.5",
            "serialNumber": "urn:uuid:$(cat /proc/sys/kernel/random/uuid 2>/dev/null || echo "00000000-0000-0000-0000-000000000000")",
            "version": 1,
            "metadata": {
              "timestamp": "${TIMESTAMP}",
              "component": {
                "type": "application",
                "name": "Fedora-Update-Enhancer",
                "version": "${VERSION}",
                "description": "High-performance unattended Fedora updater powered by dnf5",
                "licenses": [{ "license": { "id": "MIT" } }],
                "purl": "pkg:github/jalsarraf0/Fedora-Update-Enhancer@${VERSION}"
              },
              "tools": [
                { "name": "github-actions", "version": "ci" }
              ]
            },
            "components": [
              {
                "type": "file",
                "name": "elegant-updater.sh",
                "version": "${VERSION}",
                "hashes": [
                  { "alg": "SHA-256", "content": "${SCRIPT_SHA256}" }
                ],
                "description": "Main updater script (Bash)",
                "scope": "required"
              }
            ]
          }
          EOF

          echo "--- SBOM generated ---"
          cat sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
